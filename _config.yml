title: P1 Creations
description: An independent software development studio based in Chicago.
url: "https://p1e85.github.io/p1-studio" 
future: true

# This tells Jekyll to use its standard Markdown processor
markdown: kramdown

# We will ignore some folders later so Jekyll doesn't try to build them
exclude:
  - node_modules

# Custom Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/