---
layout: default
---
<article class="max-w-2xl mx-auto mt-12">
    <header class="mb-10">
        <h1 class="text-4xl font-bold text-white mb-4">{{ page.title }}</h1>
        <time class="text-green-500 font-mono text-sm" datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%B %d, %Y" }}
        </time>
    </header>

    <div class="prose prose-invert prose-green max-w-none text-gray-300 leading-relaxed">
        {{ content }}
    </div>
</article>
